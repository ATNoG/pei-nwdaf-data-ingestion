services:
  data-ingestion:
    container_name: data-ingestion
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7000:7000"
    environment:
      - KAFKA_HOST=${KAFKA_HOST}
      - KAFKA_PORT=${KAFKA_PORT}
      - KAFKA_TOPIC=network.data.ingested
      - CORS_ORIGINS=${DASHBOARD_URL},http://localhost:3000,http://127.0.0.1:5173
      - POLICY_SERVICE_URL=${POLICY_SERVICE_URL}
      - POLICY_COMPONENT_ID=data-ingestion
      - POLICY_ENABLED=${POLICY_ENABLED}
      - POLICY_ROLENAME=ingestion
      - HOST=${INGESTION_HOST:-data-ingestion}
      - PORT=7000
      - PRODUCER_MAX_TIMEOUT=30
    networks:
      - nwdaf-network

networks:
  nwdaf-network:
    name: nwdaf-network
